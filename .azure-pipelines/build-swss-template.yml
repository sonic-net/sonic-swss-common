parameters:
- name: arch
  type: string
  values:
  - amd64
  - armhf
  - arm64
  default: amd64

- name: pool
  type: string
  values:
  - sonicso1ES-amd64
  - default
  default: default

- name: timeout
  type: number
  default: 90

- name: debian_version
  type: string

- name: sairedis_artifact_name
  type: string

- name: swss_common_artifact_name
  type: string

- name: artifact_name
  type: string

jobs:
- job:
  displayName: ${{ parameters.arch }}
  timeoutInMinutes: ${{ parameters.timeout }}

  pool:
    ${{ if ne(parameters.pool, 'default') }}:
      name: ${{ parameters.pool }}
    ${{ else }}:
      vmImage: 'ubuntu-22.04'

  container:
    # TEMPORARY (PoC): pin the sonic-slave image tag to `master` instead of
    # $(BUILD_BRANCH). Only master-tagged slave images are published; the
    # lawlee/ci-unify feature branch has no image. Restore $(BUILD_BRANCH) before merge.
    image: sonicdev-microsoft.azurecr.io:443/sonic-slave-${{ parameters.debian_version }}:master-${{ parameters.arch }}

  steps:
  - checkout: sonic-swss
    submodules: true
    clean: true
  - script: |
      set -ex
      # TEMPORARY (PoC): check out `master` instead of $(BUILD_BRANCH). sonic-swss
      # has no lawlee/ci-unify branch on the sonic-net remote. Restore $(BUILD_BRANCH)
      # before merge.
      git checkout master
      git submodule update
      git status
    displayName: Set up sonic-swss branch
  - script: |
      set -ex
      sudo apt-get update
      sudo apt-get install -y libhiredis0.14 libhiredis-dev
      sudo apt-get install -y libzmq5 libzmq3-dev
      sudo apt-get install -qq -y \
          libhiredis-dev \
          swig4.0
      sudo apt-get install -y libdbus-1-3
      sudo apt-get install -y libteam-dev \
          libteam5 \
          libteamdctl0
    displayName: "Install dependencies"
  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: ${{ parameters.swss_common_artifact_name }}
      path: $(Build.ArtifactStagingDirectory)/download
      patterns: |
        libswsscommon_1.0.0_*.deb
        libswsscommon-dev_1.0.0*.deb
    displayName: "Download pre-stage built ${{ parameters.swss_common_artifact_name }}"
  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: ${{ parameters.sairedis_artifact_name }}
      path: $(Build.ArtifactStagingDirectory)/download
      patterns: |
        libsaivs_*.deb
        libsaivs-dev_*.deb
        libsairedis_*.deb
        libsairedis-dev_*.deb
        libsaimetadata_*.deb
        libsaimetadata-dev_*.deb
        syncd-vs_*.deb
    displayName: "Download pre-stage built ${{ parameters.sairedis_artifact_name }}"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: Azure.sonic-buildimage.common_libs
      runVersion: 'latestFromBranch'
      # TEMPORARY (PoC): pin to refs/heads/master; the common_libs pipeline has no
      # lawlee/ci-unify branch. Restore refs/heads/$(BUILD_BRANCH) before merge.
      runBranch: 'refs/heads/master'
      path: $(Build.ArtifactStagingDirectory)/download
      artifact: common-lib
      patterns: |
        target/debs/${{ parameters.debian_version }}/libnl-3*.deb
        target/debs/${{ parameters.debian_version }}/libnl-genl*.deb
        target/debs/${{ parameters.debian_version }}/libnl-route*.deb
        target/debs/${{ parameters.debian_version }}/libnl-nf*.deb
        target/debs/${{ parameters.debian_version }}/libnl-cli*.deb
        target/debs/${{ parameters.debian_version }}/libyang3_*.deb
        target/debs/${{ parameters.debian_version }}/libyang-dev_3*.deb
        target/debs/${{ parameters.debian_version }}/python3-libyang*.deb
        target/debs/${{ parameters.debian_version }}/libprotobuf*.deb
        target/debs/${{ parameters.debian_version }}/libprotoc*.deb
        target/debs/${{ parameters.debian_version }}/protobuf-compiler*.deb
        target/debs/${{ parameters.debian_version }}/libnexthopgroup*.deb
    displayName: "Download common libs"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: sonic-net.sonic-dash-api
      ${{ if eq(parameters.arch, 'amd64') }}:
        artifact: sonic-dash-api
      ${{ else }}:
        artifact: sonic-dash-api.${{ parameters.arch }}
      runVersion: 'latestFromBranch'
      # TEMPORARY (PoC): pin to refs/heads/master; sonic-dash-api has no
      # lawlee/ci-unify branch. Restore refs/heads/$(BUILD_BRANCH) before merge.
      runBranch: 'refs/heads/master'
      path: $(Build.ArtifactStagingDirectory)/download
      patterns: |
        libdashapi*.deb
    displayName: "Download sonic-dash-api"
  # BuildSairedis now reuses sonic-sairedis's build template, which produces a
  # vpp-enabled sonic-sairedis (libsaivs depends on vpp/libvppinfra). Download the
  # SONiC platform-vpp packages so the vpp-dependent libsaivs can be configured.
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: sonic-net.sonic-platform-vpp
      artifact: vpp-${{ parameters.debian_version }}
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/master'
      allowPartiallySucceededBuilds: true
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download sonic platform-vpp deb packages"
    condition: eq('${{ parameters.arch }}', 'amd64')

  - script: |
      set -ex
      # Install everything in one dpkg -i so dependencies configure in the right order
      # (libnl -> vpp -> libsaivs). VPP_INSTALL_SKIP_SYSCTL=1 lets vpp's postinst run
      # in CI (BuildSairedis reuses sairedis's template -> vpp-enabled libsaivs).
      sudo env VPP_INSTALL_SKIP_SYSCTL=1 dpkg -i $(find ./download -name *.deb)
      rm -rf download || true
    workingDirectory: $(Build.ArtifactStagingDirectory)
    displayName: "Install libnl3, libyang, sonic swss common, sairedis, vpp"
  - script: |
      set -ex
      rm ../*.deb || true
      ./autogen.sh
      dpkg-buildpackage -us -uc -b -j$(nproc)
      mv ../*.deb $(Build.ArtifactStagingDirectory)
    displayName: "Compile sonic swss"
  - publish: $(Build.ArtifactStagingDirectory)
    artifact: ${{ parameters.artifact_name }}
    displayName: "Archive swss debian packages"
