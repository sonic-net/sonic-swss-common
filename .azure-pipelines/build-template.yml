parameters:
- name: arch
  type: string
  values:
  - amd64
  - armhf
  - arm64

- name: pool
  type: string
  values:
  - sonicso1ES-amd64
  - sonicso1ES-arm64
  - sonicso1ES-armhf
  - default
  default: default

- name: timeout
  type: number
  default: 60

- name: artifact_name
  type: string

- name: run_unit_test
  type: boolean
  default: false

- name: archive_gcov
  type: boolean
  default: false

- name: debian_version
  type: string
  default: bullseye

jobs:
- job:
  displayName: ${{ parameters.arch }}
  timeoutInMinutes: ${{ parameters.timeout }}
  variables:
    DIFF_COVER_CHECK_THRESHOLD: 80
    ${{ if eq(parameters.run_unit_test, true) }}:
      DIFF_COVER_ENABLE: 'true'

  pool:
    ${{ if ne(parameters.pool, 'default') }}:
      name: ${{ parameters.pool }}
    ${{ else }}:
      vmImage: 'ubuntu-22.04'

  container:
    # TEMPORARY (PoC): pin the sonic-slave image tag to `master` instead of
    # $(BUILD_BRANCH). Only master-tagged slave images are published; the
    # lawlee/ci-unify feature branch has no image. Restore $(BUILD_BRANCH) before merge.
    image: sonicdev-microsoft.azurecr.io:443/sonic-slave-${{ parameters.debian_version }}:master-${{ parameters.arch }}

  steps:
  - checkout: self
    clean: true
  - script: |
      set -ex
      # Bootstrap the tool's own runtime deps (buildenv_setup needs PyYAML + requests).
      sudo apt-get update
      sudo apt-get install -qq -y python3-yaml python3-requests
      # buildenv_setup lives in this repo's ci/ (sonic-swss-common hosts the shared
      # tool), so run it straight from the checkout -- no clone needed here.
      # It installs apt/pip deps, downloads + installs the libyang3 DEBs and the
      # sonic-yang wheels (from upstream-artifacts.yaml), and runs the redis /
      # yang-models post-install hooks.
      PYTHONPATH=$(Build.SourcesDirectory)/ci python3 -m buildenv_setup \
        --repo-dir $(Build.SourcesDirectory) \
        --scope build \
        --arch ${{ parameters.arch }} \
        --debian-version ${{ parameters.debian_version }} \
        --branch $(BUILD_BRANCH)
    displayName: "Set up build environment (buildenv_setup)"
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  - script: ./build-env/build.sh
    displayName: "Compile sonic swss common with coverage enabled"
  - ${{ if eq(parameters.run_unit_test, true) }}:
    - script: |
        set -ex
        sudo dpkg -i libswsscommon_*.deb
        sudo dpkg -i libswsscommon-dev_*.deb
        sudo dpkg -i python3-swsscommon_*.deb

        ps aux
        cargo test           --workspace --all-features
        cargo test --release --workspace --all-features

        ./tests/tests
        redis-cli FLUSHALL
        pytest-3 --cov=. --cov-report=xml
        [ -f coverage.xml ] && mv coverage.xml tests/coverage.xml
        gcovr -r ./ -e ".*/swsscommon_wrap.cpp" -e=tests --exclude-unreachable-branches --exclude-throw-branches --gcov-ignore-parse-errors -x --xml-pretty  -o coverage.xml
        make -C goext
        redis-cli FLUSHALL
        make -C goext check
      displayName: "Run swss common unit tests"
  - publish: $(System.DefaultWorkingDirectory)/
    artifact: ${{ parameters.artifact_name }}
    displayName: "Archive swss common debian packages"
  - ${{ if eq(parameters.archive_gcov, true) }}:
    - script: |
        set -ex
        # Install .NET CORE
        curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
        sudo apt-add-repository https://packages.microsoft.com/debian/12/prod
        sudo apt-get update
        sudo apt-get install -y dotnet-sdk-8.0
      displayName: "Install .NET CORE"
    - task: PublishCodeCoverageResults@1
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
      displayName: 'Publish test coverage'
