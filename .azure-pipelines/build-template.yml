parameters:
- name: arch
  type: string
  values:
  - amd64
  - armhf
  - arm64

- name: pool
  type: string
  values:
  - sonicso1ES-amd64
  - sonicso1ES-arm64
  - sonicso1ES-armhf
  - default
  default: default

- name: timeout
  type: number
  default: 60

- name: artifact_name
  type: string

- name: run_unit_test
  type: boolean
  default: false

- name: archive_gcov
  type: boolean
  default: false

- name: debian_version
  type: string
  default: bullseye

jobs:
- job:
  displayName: ${{ parameters.arch }}
  timeoutInMinutes: ${{ parameters.timeout }}
  variables:
    DIFF_COVER_CHECK_THRESHOLD: 80
    ${{ if eq(parameters.run_unit_test, true) }}:
      DIFF_COVER_ENABLE: 'true'

  pool:
    ${{ if ne(parameters.pool, 'default') }}:
      name: ${{ parameters.pool }}
    ${{ else }}:
      vmImage: 'ubuntu-22.04'

  container:
    image: sonicdev-microsoft.azurecr.io:443/sonic-slave-${{ parameters.debian_version }}:$(BUILD_BRANCH)-${{ parameters.arch }}

  steps:
  - checkout: self
    clean: true
  - script: |
      set -ex
      sudo apt-get update
      sudo apt-get install -qq -y \
        libhiredis-dev \
        libnl-3-dev \
        libnl-genl-3-dev \
        libnl-route-3-dev \
        libnl-nf-3-dev \
        swig
    displayName: "Install dependencies"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: Azure.sonic-buildimage.common_libs
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/$(BUILD_BRANCH)'
      path: $(Build.ArtifactStagingDirectory)/download
      ${{ if eq(parameters.arch, 'amd64') }}:
        artifact: common-lib
      ${{ else }}:
        artifact: common-lib.${{ parameters.arch }}
      patterns: |
        target/debs/${{ parameters.debian_version }}/libyang-*_1.0*.deb
        target/debs/${{ parameters.debian_version }}/libyang_1.0*.deb
        target/debs/${{ parameters.debian_version }}/libyang-cpp_*.deb
        target/debs/${{ parameters.debian_version }}/python3-yang_*.deb
        target/debs/${{ parameters.debian_version }}/libyang3_3*.deb
        target/debs/${{ parameters.debian_version }}/libyang-dev_3*.deb
        target/debs/${{ parameters.debian_version }}/python3-libyang_*.deb
    displayName: "Download libyang from ${{ parameters.arch }} common lib"
    condition: ne('${{ parameters.debian_version }}', 'trixie')
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: Azure.sonic-buildimage.common_libs
      runVersion: 'specific'
      pipelineId: '926659'
      path: $(Build.ArtifactStagingDirectory)/download
      ${{ if eq(parameters.arch, 'amd64') }}:
        artifact: common-lib
      ${{ else }}:
        artifact: common-lib.${{ parameters.arch }}
      patterns: |
        target/debs/${{ parameters.debian_version }}/libyang-*_1.0*.deb
        target/debs/${{ parameters.debian_version }}/libyang_1.0*.deb
        target/debs/${{ parameters.debian_version }}/libyang-cpp_*.deb
        target/debs/${{ parameters.debian_version }}/python3-yang_*.deb
        target/debs/${{ parameters.debian_version }}/libyang3_3*.deb
        target/debs/${{ parameters.debian_version }}/libyang-dev_3*.deb
        target/debs/${{ parameters.debian_version }}/python3-libyang_*.deb
        target/debs/${{ parameters.debian_version }}/libpcre*.deb
    displayName: "Download libyang from ${{ parameters.arch }} common lib"
    condition: eq('${{ parameters.debian_version }}', 'trixie')
  - script: |
      set -ex
      # Exclude libyang-dev_3*.deb from the dpkg install: it has the same
      # package name (``libyang-dev``) as the libyang1 libyang-dev that the
      # C++ compile still needs. We'll instead extract it into a private
      # sysroot below for the Python binding build.
      find ./download -name '*.deb' ! -name 'libyang-dev_3*.deb' -print0 \
        | xargs -0 sudo dpkg -i
      # The trixie common-lib pin (pipelineId 926659) predates
      # sonic-net/sonic-buildimage#26584 and doesn't ship
      # python3-libyang_*.deb. trixie's own apt repo doesn't have a
      # ``python3-libyang`` package either, so fall back to building the
      # CESNET libyang Python binding from PyPI sdist. We build against a
      # local sysroot extracted from libyang3 + libyang-dev_3*.deb because
      # the libyang1 ``libyang-dev`` we just installed has a clashing
      # ``libyang.so`` symlink that would otherwise make the linker pick up
      # the v1 ABI -- which is missing symbols like ``lyplg_ext_parse_log``
      # that the v3 Python binding needs.
      if ! python3 -c 'import libyang' 2>/dev/null; then
        DEBS=./download/target/debs/${{ parameters.debian_version }}
        LIBYANG3_DEV_DEB=$(ls $DEBS/libyang-dev_3*.deb 2>/dev/null | head -n1 || true)
        LIBYANG3_DEB=$(ls $DEBS/libyang3_3*.deb 2>/dev/null | head -n1 || true)
        if [ -n "$LIBYANG3_DEV_DEB" ] && [ -n "$LIBYANG3_DEB" ]; then
          SYSROOT=/tmp/libyang3-sysroot
          sudo rm -rf $SYSROOT
          sudo mkdir -p $SYSROOT
          sudo dpkg-deb -x $LIBYANG3_DEB $SYSROOT
          sudo dpkg-deb -x $LIBYANG3_DEV_DEB $SYSROOT
          sudo apt-get install -y python3-cffi python3-setuptools python3-wheel python3-dev pkg-config dpkg-dev libpcre2-dev || true
          MULTIARCH=$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || gcc -print-multiarch)
          sudo CFLAGS="-I$SYSROOT/usr/include" \
               LDFLAGS="-L$SYSROOT/usr/lib/$MULTIARCH -Wl,-rpath,/usr/lib/$MULTIARCH" \
               pip3 install --no-build-isolation 'libyang==3.1.0'
        else
          sudo apt-get install -y python3-cffi python3-setuptools python3-wheel python3-dev pkg-config || true
          sudo pip3 install --no-build-isolation 'libyang==3.1.0'
        fi
      fi
    workingDirectory: $(Build.ArtifactStagingDirectory)
    displayName: "Install libyang from common lib"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: 142
      artifact: sonic-buildimage.vs
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/$(BUILD_BRANCH)'
      path: $(Build.ArtifactStagingDirectory)/download
      patterns: |
        target/python-wheels/${{ parameters.debian_version }}/sonic_yang_mgmt-1.0-py3-none-any.whl
        target/python-wheels/${{ parameters.debian_version }}/sonic_yang_models-1.0-py3-none-any.whl
    displayName: "Download yang wheel from latest sonic-buildimage build"
    condition: ne('${{ parameters.debian_version }}', 'trixie')
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: 142
      artifact: sonic-buildimage.vs
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/$(BUILD_BRANCH)'
      path: $(Build.ArtifactStagingDirectory)/download
      patterns: |
        target/python-wheels/bookworm/sonic_yang_mgmt-1.0-py3-none-any.whl
        target/python-wheels/bookworm/sonic_yang_models-1.0-py3-none-any.whl
    displayName: "Download yang wheel from latest sonic-buildimage build"
    condition: eq('${{ parameters.debian_version }}', 'trixie')
  - script: |
      set -ex
      sudo pip3 install ./download/target/python-wheels/${{ parameters.debian_version }}/sonic_yang_mgmt-1.0-py3-none-any.whl \
                        ./download/target/python-wheels/${{ parameters.debian_version }}/sonic_yang_models-1.0-py3-none-any.whl
    workingDirectory: $(Build.ArtifactStagingDirectory)
    displayName: "Install yang wheel from common lib"
    condition: ne('${{ parameters.debian_version }}', 'trixie')
  - script: |
      set -ex
      sudo pip3 install ./download/target/python-wheels/bookworm/sonic_yang_mgmt-1.0-py3-none-any.whl \
                        ./download/target/python-wheels/bookworm/sonic_yang_models-1.0-py3-none-any.whl
    workingDirectory: $(Build.ArtifactStagingDirectory)
    displayName: "Install yang wheel from common lib"
    condition: eq('${{ parameters.debian_version }}', 'trixie')
  - script: |
      set -ex
      rm ../*.deb || true
      ./autogen.sh
      DEB_CONFIGURE_EXTRA_FLAGS='--enable-code-coverage' DEB_CXXFLAGS_APPEND="-coverage -fprofile-abs-path" DEB_LDFLAGS_APPEND="-coverage -fprofile-abs-path" dpkg-buildpackage -Pnopython2 -us -uc -b -j$(nproc)
      mv ../*.deb .
    displayName: "Compile sonic swss common with coverage enabled"
  - ${{ if eq(parameters.run_unit_test, true) }}:
    - script: |
        set -ex
        sudo pip install Pympler==0.8 pytest
        sudo apt-get install -y redis-server
        sudo dpkg -i libswsscommon_*.deb
        sudo dpkg -i libswsscommon-dev_*.deb
        sudo dpkg -i python3-swsscommon_*.deb

        ps aux
        cargo test           --workspace --all-features
        cargo test --release --workspace --all-features

        sudo sed -i 's/notify-keyspace-events ""/notify-keyspace-events AKE/' /etc/redis/redis.conf
        sudo sed -ri 's/^# unixsocket/unixsocket/' /etc/redis/redis.conf
        sudo sed -ri 's/^unixsocketperm .../unixsocketperm 777/' /etc/redis/redis.conf
        sudo sed -ri 's/redis-server.sock/redis.sock/' /etc/redis/redis.conf
        sudo service redis-server restart
        sudo mkdir -p /usr/local/yang-models

        ./tests/tests
        redis-cli FLUSHALL
        pytest-3 --cov=. --cov-report=xml
        [ -f coverage.xml ] && mv coverage.xml tests/coverage.xml
        gcovr -r ./ -e ".*/swsscommon_wrap.cpp" -e=tests --exclude-unreachable-branches --exclude-throw-branches --gcov-ignore-parse-errors -x --xml-pretty  -o coverage.xml
        make -C goext
        redis-cli FLUSHALL
        make -C goext check

        rm -rf $(Build.ArtifactStagingDirectory)/download
      displayName: "Run swss common unit tests"
  - publish: $(System.DefaultWorkingDirectory)/
    artifact: ${{ parameters.artifact_name }}
    displayName: "Archive swss common debian packages"
  - ${{ if eq(parameters.archive_gcov, true) }}:
    - script: |
        set -ex
        # Install .NET CORE
        curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
        sudo apt-add-repository https://packages.microsoft.com/debian/12/prod
        sudo apt-get update
        sudo apt-get install -y dotnet-sdk-8.0
      displayName: "Install .NET CORE"
    - task: PublishCodeCoverageResults@1
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
      displayName: 'Publish test coverage'
