parameters:
- name: timeout
  type: number
  default: 360

- name: log_artifact_name
  type: string

- name: debian_version
  type: string
  default: bookworm

- name: sonic_buildimage_ubuntu22_04
  type: string
  # TEMPORARY (PoC): pin to master; the sonic-buildimage-ubuntu22.04 pipeline has no
  # lawlee/ci-unify branch. Restore '$(BUILD_BRANCH)' before merge.
  default: 'master'

jobs:
- job:
  displayName: vstest
  timeoutInMinutes: ${{ parameters.timeout }}

  pool: sonictest

  steps:
  - checkout: self
    clean: true
    displayName: "Checkout sonic-swss-common"
  - checkout: sonic-swss
    clean: true
    displayName: "Checkout sonic-swss"
  - script: |
      set -ex
      cd sonic-swss
      # TEMPORARY (PoC): check out `master` instead of $(BUILD_BRANCH). sonic-swss
      # has no lawlee/ci-unify branch on the sonic-net remote. Restore $(BUILD_BRANCH)
      # before merge.
      git checkout master
    displayName: Set up sonic-swss branch
  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: docker-sonic-vs
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download pre-stage built docker-sonic-vs"
  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: sonic-swss-common.amd64.ubuntu22_04
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download pre-stage built sonic-swss-common.amd64.ubuntu22_04"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: Azure.sonic-buildimage.common_libs
      runVersion: 'latestFromBranch'
      # TEMPORARY (PoC): pin to refs/heads/master; the common_libs pipeline has no
      # lawlee/ci-unify branch. Restore refs/heads/$(BUILD_BRANCH) before merge.
      runBranch: 'refs/heads/master'
      path: $(Build.ArtifactStagingDirectory)/download
      artifact: common-lib
      patterns: |
        target/debs/${{ parameters.debian_version }}/libnl-3-200_*.deb
        target/debs/${{ parameters.debian_version }}/libnl-genl-3-200_*.deb
        target/debs/${{ parameters.debian_version }}/libnl-route-3-200_*.deb
        target/debs/${{ parameters.debian_version }}/libnl-nf-3-200_*.deb
        target/debs/${{ parameters.debian_version }}/libyang3_*.deb
        target/debs/${{ parameters.debian_version }}/libyang-dev_3*.deb
    displayName: "Download libnl + libyang from common lib"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: sonic-net.sonic-buildimage-ubuntu22.04
      artifact: sonic-buildimage.amd64.ubuntu22_04
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/${{ parameters.sonic_buildimage_ubuntu22_04 }}'
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download sonic buildimage ubuntu22.04 deb packages"

  - script: |
      set -ex
      # install packages for vs test
      sudo uv pip install --system pytest flaky exabgp docker

      # install packages for kvm test
      sudo apt-get -o DPkg::Lock::Timeout=600 install -y libvirt-clients \
          qemu \
          openvswitch-switch \
          net-tools \
          bridge-utils \
          vlan \
          python3-libvirt \
          libzmq3-dev \
          libzmq5 \
          libhiredis0.14 \
          libpcre3-dev \
          uuid-dev \
          net-tools \
          bridge-utils \
          python3-redis

      sudo sonic-swss-common/.azure-pipelines/build_and_install_module.sh

      # Install SONiC-patched libnl (3.7.0-0.2+b1sonicN) from common-lib BEFORE the
      # swss-common deb. The jammy swss-common .deb (built by the ubuntu-22.04 job
      # against common-lib libnl) depends on the +b1sonicN libnl, which the 22.04
      # host's apt does not have. Use apt so the bookworm libnl runtime debs'
      # dependencies resolve on the jammy host (same as the libyang install below).
      sudo apt-get install -y \
          $(Build.ArtifactStagingDirectory)/download/target/debs/${{ parameters.debian_version }}/libnl-3-200_*.deb \
          $(Build.ArtifactStagingDirectory)/download/target/debs/${{ parameters.debian_version }}/libnl-genl-3-200_*.deb \
          $(Build.ArtifactStagingDirectory)/download/target/debs/${{ parameters.debian_version }}/libnl-route-3-200_*.deb \
          $(Build.ArtifactStagingDirectory)/download/target/debs/${{ parameters.debian_version }}/libnl-nf-3-200_*.deb

      # Install libyang packages from downloaded artifacts. Use apt rather
      # than `dpkg -i` so libyang-dev's libpcre2-dev dep is auto-resolved
      # from the host repos.
      sudo apt-get install -y \
          $(Build.ArtifactStagingDirectory)/download/target/debs/${{ parameters.debian_version }}/libyang3_*.deb \
          $(Build.ArtifactStagingDirectory)/download/target/debs/${{ parameters.debian_version }}/libyang-dev_3*.deb

      # python3-libyang's bookworm .deb pins python3 (>= 3.11~, << 3.12)
      # and the sonictest pool host runs Ubuntu 22.04 (python 3.10), so the
      # .deb won't install regardless of resolver. Build the Python bindings
      # from PyPI instead — same fallback as the inline amd64/ubuntu-22.04
      # job. --no-build-isolation + apt's python3-cffi sidesteps a cffi
      # version-mismatch Exception that jammy's pip 22.0.2 build-isolation
      # env otherwise triggers. --no-build-isolation needs wheel present
      # in the environment to provide bdist_wheel, so install it first.
      sudo apt-get install -y python3-cffi python3-dev
      sudo uv pip install --system wheel
      sudo uv pip install --system --no-build-isolation 'libyang==3.3.0'

      sudo dpkg -i $(Build.ArtifactStagingDirectory)/download/libprotobuf*_amd64.deb $(Build.ArtifactStagingDirectory)/download/libprotobuf-lite*_amd64.deb $(Build.ArtifactStagingDirectory)/download/python3-protobuf*_amd64.deb 
      sudo dpkg -i $(Build.ArtifactStagingDirectory)/download/libdashapi*.deb
      sudo dpkg -i --force-confask,confnew $(Build.ArtifactStagingDirectory)/download/libswsscommon_1.0.0_amd64.deb || sudo apt-get install -y -f
      sudo dpkg -i $(Build.ArtifactStagingDirectory)/download/python3-swsscommon_1.0.0_amd64.deb
    displayName: "Install dependencies"

  - script: |
      set -ex
      sudo docker load -i $(Build.ArtifactStagingDirectory)/download/docker-sonic-vs.gz
      docker ps
      ip netns list
      sudo /sbin/ip link add Vrf1 type vrf table 1001 || { echo 'vrf command failed' ; exit 1; }
      sudo /sbin/ip link del Vrf1 type vrf table 1001
      pushd sonic-swss/tests

      all_tests=$(ls test_*.py | xargs)
      all_tests="${all_tests} p4rt dash"

      # Run the tests in parallel and retry
      retry=3
      IMAGE_NAME=docker-sonic-vs:$(Build.DefinitionName).$(Build.BuildNumber)
      echo $all_tests | xargs -n 1 | xargs -P 8 -I TEST_MODULE sudo ./run-tests.sh "$IMAGE_NAME" "--force-flaky --force-recreate-dvs" "TEST_MODULE" 3

      rm -rf $(Build.ArtifactStagingDirectory)/download
    displayName: "Run vs tests"
    ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
      continueOnError: true

  - task: PublishTestResults@2
    inputs:
      testResultsFiles: '**/*_tr.xml'
      testRunTitle: vstest
    condition: always()

  - script: |
      if [ -d sonic-swss/tests/log ]; then
        cp -r sonic-swss/tests/log $(Build.ArtifactStagingDirectory)/
      fi
    displayName: "Collect logs"
    condition: always()

  - publish: $(Build.ArtifactStagingDirectory)/
    artifact: ${{ parameters.log_artifact_name }}@$(System.JobAttempt)
    displayName: "Publish logs"
    condition: always()
