parameters:
- name: timeout
  type: number
  default: 360

- name: log_artifact_name
  type: string

- name: debian_version
  type: string
  default: bookworm

- name: sonic_buildimage_ubuntu22_04
  type: string
  default: '$(BUILD_BRANCH)'

jobs:
- job:
  displayName: vstest
  timeoutInMinutes: ${{ parameters.timeout }}

  pool: sonictest

  steps:
  - checkout: self
    clean: true
    displayName: "Checkout sonic-swss-common"
  - checkout: sonic-swss
    clean: true
    displayName: "Checkout sonic-swss"
  - script: |
      set -ex
      cd sonic-swss
      git checkout $(BUILD_BRANCH)
    displayName: Set up sonic-swss branch
  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: docker-sonic-vs
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download pre-stage built docker-sonic-vs"
  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: sonic-swss-common.amd64.ubuntu22_04
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download pre-stage built sonic-swss-common.amd64.ubuntu22_04"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: Azure.sonic-buildimage.common_libs
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/$(BUILD_BRANCH)'
      path: $(Build.ArtifactStagingDirectory)/download
      artifact: common-lib
      patterns: |
        target/debs/${{ parameters.debian_version }}/libyang-*_1.0*.deb
        target/debs/${{ parameters.debian_version }}/libyang_1.0*.deb
        target/debs/${{ parameters.debian_version }}/libyang-cpp_*.deb
        target/debs/${{ parameters.debian_version }}/python3-yang_*.deb
        target/debs/${{ parameters.debian_version }}/libyang3_3*.deb
        target/debs/${{ parameters.debian_version }}/libyang-dev_3*.deb
    displayName: "Download libyang from common lib"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: sonic-net.sonic-buildimage-ubuntu22.04
      artifact: sonic-buildimage.amd64.ubuntu22_04
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/${{ parameters.sonic_buildimage_ubuntu22_04 }}'
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download sonic buildimage ubuntu22.04 deb packages"

  - script: |
      set -ex
      # install packages for vs test
      sudo pip3 install pytest flaky exabgp docker

      # install packages for kvm test
      sudo apt-get -o DPkg::Lock::Timeout=600 install -y libvirt-clients \
          qemu \
          openvswitch-switch \
          net-tools \
          bridge-utils \
          vlan \
          python3-libvirt \
          libzmq3-dev \
          libzmq5 \
          libhiredis0.14 \
          libpcre3-dev \
          uuid-dev \
          net-tools \
          bridge-utils \
          python3-redis

      sudo sonic-swss-common/.azure-pipelines/build_and_install_module.sh

      # Install libyang packages from downloaded artifacts
      DEBS=$(Build.ArtifactStagingDirectory)/download/target/debs/${{ parameters.debian_version }}
      sudo dpkg -i $DEBS/libyang-*_1.0*.deb \
                   $DEBS/libyang_1.0*.deb \
                   $DEBS/libyang-cpp_*.deb \
                   $DEBS/python3-yang_*.deb
      # libyang3 system library is needed because sonic-yang-mgmt
      # (sonic-net/sonic-buildimage#26584) was ported from libyang1 to libyang3.
      sudo dpkg -i $DEBS/libyang3_3*.deb
      # Build the CESNET libyang Python binding from sdist against a local
      # sysroot extracted from libyang3 + libyang-dev_3*.deb. We can't dpkg-
      # install python3-libyang_3*.deb directly (bookworm-built; requires
      # Python >= 3.11 while this pool may run Python 3.10), nor can we
      # install libyang-dev_3*.deb system-wide (same package name as the
      # libyang1 libyang-dev that other components still need; its
      # `libyang.so` symlink would otherwise mask v1's). PyPI doesn't publish
      # a binary wheel for libyang, so a from-source build is the only option.
      SYSROOT=/tmp/libyang3-sysroot
      sudo rm -rf $SYSROOT
      sudo mkdir -p $SYSROOT
      sudo dpkg-deb -x $DEBS/libyang3_3*.deb $SYSROOT
      sudo dpkg-deb -x $DEBS/libyang-dev_3*.deb $SYSROOT
      sudo apt-get install -y python3-cffi python3-setuptools python3-wheel python3-dev pkg-config
      sudo CFLAGS="-I$SYSROOT/usr/include" \
           LDFLAGS="-L$SYSROOT/usr/lib/x86_64-linux-gnu -Wl,-rpath,/usr/lib/x86_64-linux-gnu" \
           pip3 install --no-build-isolation 'libyang==3.1.0'

      sudo dpkg -i $(Build.ArtifactStagingDirectory)/download/libprotobuf*_amd64.deb $(Build.ArtifactStagingDirectory)/download/libprotobuf-lite*_amd64.deb $(Build.ArtifactStagingDirectory)/download/python3-protobuf*_amd64.deb 
      sudo dpkg -i $(Build.ArtifactStagingDirectory)/download/libdashapi*.deb
      sudo dpkg -i --force-confask,confnew $(Build.ArtifactStagingDirectory)/download/libswsscommon_1.0.0_amd64.deb || sudo apt-get install -y -f
      sudo dpkg -i $(Build.ArtifactStagingDirectory)/download/python3-swsscommon_1.0.0_amd64.deb
    displayName: "Install dependencies"

  - script: |
      set -ex
      sudo docker load -i $(Build.ArtifactStagingDirectory)/download/docker-sonic-vs.gz
      docker ps
      ip netns list
      sudo /sbin/ip link add Vrf1 type vrf table 1001 || { echo 'vrf command failed' ; exit 1; }
      sudo /sbin/ip link del Vrf1 type vrf table 1001
      pushd sonic-swss/tests

      all_tests=$(ls test_*.py | xargs)
      all_tests="${all_tests} p4rt dash"

      # Run the tests in parallel and retry
      retry=3
      IMAGE_NAME=docker-sonic-vs:$(Build.DefinitionName).$(Build.BuildNumber)
      echo $all_tests | xargs -n 1 | xargs -P 8 -I TEST_MODULE sudo ./run-tests.sh "$IMAGE_NAME" "--force-recreate-dvs" "TEST_MODULE" 3

      rm -rf $(Build.ArtifactStagingDirectory)/download
    displayName: "Run vs tests"
    ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
      continueOnError: true

  - task: PublishTestResults@2
    inputs:
      testResultsFiles: '**/*_tr.xml'
      testRunTitle: vstest
    condition: always()

  - script: |
      if [ -d sonic-swss/tests/log ]; then
        cp -r sonic-swss/tests/log $(Build.ArtifactStagingDirectory)/
      fi
    displayName: "Collect logs"
    condition: always()

  - publish: $(Build.ArtifactStagingDirectory)/
    artifact: ${{ parameters.log_artifact_name }}@$(System.JobAttempt)
    displayName: "Publish logs"
    condition: always()
